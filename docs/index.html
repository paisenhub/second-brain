<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
// Brain 1.0 — client-side Gemini search
window.BRAIN = {
  getKey: () => localStorage.getItem('sb_gemini_key') || '',
  setKey: (k) => localStorage.setItem('sb_gemini_key', k),

  async search(question, memories) {
    const key = window.BRAIN.getKey();
    if (!key) return { summary: null, relevantIndices: [] };

    const memorySummaries = memories.map((m, i) => {
      const text = [m.title, m.body, ...(m.tags||[]), ...(m.aiTags||[])].filter(Boolean).join(' ');
      return `[${i}] ${text}`;
    }).join('\n');

    const prompt = `You are a personal AI memory assistant called Brain 1.0.
The user asked: "${question}"

Here are their saved memories (index: content):
${memorySummaries}

Respond with JSON only, no markdown:
{
  "summary": "2-3 sentence answer to the user's question based on their memories. If memories are not relevant, give a helpful general answer.",
  "relevantIndices": [list of memory indices most relevant to the question, best first, max 5]
}`;

    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.4, maxOutputTokens: 512 },
          }),
        }
      );
      const data = await res.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
      const clean = raw.replace(/^```json\s*/,'').replace(/\s*```$/,'').trim();
      return JSON.parse(clean);
    } catch (e) {
      return { summary: null, relevantIndices: [] };
    }
  }
};

// Parse JWT without library
window.parseJwt = (token) => {
  try {
    const b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
    return JSON.parse(atob(b64));
  } catch { return null; }
};
</script>
